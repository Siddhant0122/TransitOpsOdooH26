version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: transitops-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transitops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: transitops-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/transitops
      JWT_SECRET_KEY: 37d7a1ea1d07c08bfa670dc5d7367b613b5b14c3e8093121bbcf03a3d5b2670e
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./seed_data:/app/seed_data

  frontend:
    build: ./frontend
    container_name: transitops-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
